    <!-- Anti-flash : appliquer le thème AVANT le rendu React -->
    <script>
      (function() {
        var stored = localStorage.getItem('it-inventory-theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme;
        if (stored === 'dark') theme = 'dark';
        else if (stored === 'light') theme = 'light';
        else theme = systemDark ? 'dark' : 'light';
        document.documentElement.classList.add(theme);
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>IT-Inventory</title>
  </head>
